services:
  jarvis-backend:
    image: node:20-alpine
    container_name: jarvis-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/tailscale:/usr/bin/tailscale:ro
      - /var/run/tailscale:/var/run/tailscale:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /opt/stacks/netalertx/data/db:/netalertx-db:ro
      - ./data:/app/data-persist
    command: sh -c "apk add --no-cache sqlite > /dev/null 2>&1 && node server.js"
    environment:
      - PORT=4000
      - ADGUARD_URL=http://192.168.1.49:80
      - ADGUARD_USER=${ADGUARD_USER:-tymastrangelo}
      - ADGUARD_PASS=${ADGUARD_PASS:-}
      - KUMA_URL=http://192.168.1.49:3001
      - KUMA_API_KEY=${KUMA_API_KEY:-}
      - NETALERTX_URL=http://192.168.1.49:20211
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - REFRESH_MS=${REFRESH_MS:-3000}
    network_mode: host
    pid: host

  jarvis-frontend:
    image: nginx:alpine
    container_name: jarvis-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    network_mode: host
    depends_on:
      - jarvis-backend

  jarvis-webhook:
    image: node:20-alpine
    container_name: jarvis-webhook
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./webhook:/app
      - /opt/stacks/jarvis:/opt/stacks/jarvis
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "apk add --no-cache docker-cli docker-cli-compose git > /dev/null 2>&1 && git config --global --add safe.directory /opt/stacks/jarvis && node listener.js"
    environment:
      - WEBHOOK_PORT=9000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - REPO_PATH=/opt/stacks/jarvis
    network_mode: host
